<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Random Coffee</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>

<div class="logo">

☕

</div>

<div>

<h1>Random Coffee</h1>

<p>Стройте новые связи внутри компании</p>

</div>

<div class="profile-button">

👤

</div>

</header>


<section class="hero">

<h2>

Познакомьтесь с коллегами из разных городов и стран

</h2>

<p>

Выберите, где вы сейчас находитесь, и найдите нового собеседника для онлайн-встречи или кофе.

</p>

</section>


<section class="filters">

<div class="field">

<label>

Страна

</label>

<select id="country">

<option>Россия</option>

<option>Беларусь</option>

<option>Казахстан</option>

<option>Узбекистан</option>

</select>

</div>


<div class="field">

<label>

Город

</label>

<select id="city">

<option>Москва</option>

<option>Калининград</option>

<option>Минск</option>

<option>Алматы</option>

<option>Ташкент</option>

</select>

</div>


<div class="field">

<label>

Формат встречи

</label>

<select id="format">

<option>Онлайн</option>

<option>Оффлайн</option>

<option>Не важно</option>

</select>

</div>

<button id="findPeople">

🎲 Найти коллег

</button>

</section>


<section class="cards" id="cards">

<!-- сюда будут добавляться карточки -->

</section>


<footer>

<div>

🤝

<span>

Построено связей

</span>

<strong>

1489

</strong>

</div>


<div>

☕

<span>

Встреч проведено

</span>

<strong>

736

</strong>

</div>


</footer>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>

</html>
